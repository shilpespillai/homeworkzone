<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="icon" type="image/svg+xml" href="/vite.svg" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Homework Zone — Fun places for learning & adventure</title>
<meta name="description" content="Homework Zone: a playful learning hub for kids with library, arts, games and progress tracking." />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#4f46e5" />
<link rel="apple-touch-icon" href="/logo.png" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'kiddy-blue': '#4fc3f7',
          'kiddy-orange': '#f29130',
          'kiddy-orange-dark': '#d35400',
          'kiddy-yellow': '#ffeb3b',
          'kiddy-cream': '#fffde7',
          'kiddy-green': '#a2d148',
        },
        fontFamily: {
          'fredoka': ['"Fredoka One"', 'cursive'],
          'quicksand': ['Quicksand', 'sans-serif'],
          'sans': ['Inter', 'sans-serif'],
        },
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1f6bff; --blue-deep:#0f3fbf;
    --purple:#7a5cf0; --pink:#ff6aa9;
    --yellow:#ffc83d; --green:#22c55e;
    --bg:#FFFDF6;
  }
  html,body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:#0f172a}
  .font-display{font-family:'Fredoka',sans-serif;letter-spacing:.2px}
  .hero-bg{background:linear-gradient(180deg,#fde8d4 0%,#fbd4e6 55%,#dff0d8 100%)}
  .card-shadow{box-shadow:0 10px 30px -12px rgba(20,40,90,.18)}
  .chip{box-shadow:0 6px 14px -8px rgba(20,40,90,.25)}
  .icon-tile{display:inline-flex;align-items:center;justify-content:center;border-radius:14px;width:44px;height:44px;font-size:22px}
  .btn-primary{background:linear-gradient(180deg,#2a73ff,#1551e6);color:white;border-radius:9999px;padding:14px 26px;font-weight:700;display:inline-flex;align-items:center;gap:10px;box-shadow:0 10px 24px -8px rgba(21,81,230,.55)}
  .btn-purple{background:linear-gradient(180deg,#8b6dff,#6d49e6);color:white;border-radius:9999px;padding:12px 22px;font-weight:700;display:inline-flex;align-items:center;gap:10px;box-shadow:0 10px 24px -8px rgba(109,73,230,.55)}
  .nav-link{display:inline-flex;align-items:center;gap:8px;font-weight:700;color:#475569;padding:8px 10px;border-radius:10px}
  .nav-link.active{color:var(--blue)}
  .progress{height:10px;border-radius:9999px;background:#fff3cf;overflow:hidden}
  .progress>span{display:block;height:100%;background:linear-gradient(90deg,#ffb020,#ff7a1a);width:64%}
</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister().then((success) => {
              if (success) {
                console.log('Unregistered localhost service worker to prevent development cache lock.');
                window.location.reload();
              }
            });
          }
        });
        if (window.caches) {
          caches.keys().then((keys) => {
            keys.forEach((key) => caches.delete(key));
          });
        }
      } else {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker registered successfully!', reg.scope))
            .catch((err) => console.log('Service Worker registration failed:', err));
        });
      }
    }
  </script>
</body>
</html>
