<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="icon" type="image/svg+xml" href="/vite.svg" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Homework Zone — Fun places for learning & adventure</title>
<meta name="description" content="Homework Zone: a playful learning hub for kids with library, arts, games and progress tracking." />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#4f46e5" />
<link rel="apple-touch-icon" href="/logo.png" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'kiddy-blue': '#4fc3f7',
          'kiddy-orange': '#f29130',
          'kiddy-orange-dark': '#d35400',
          'kiddy-yellow': '#ffeb3b',
          'kiddy-cream': '#fffde7',
          'kiddy-green': '#a2d148',
        },
        fontFamily: {
          'fredoka': ['"Fredoka One"', 'cursive'],
          'quicksand': ['Quicksand', 'sans-serif'],
          'sans': ['Inter', 'sans-serif'],
        },
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister().then((success) => {
              if (success) {
                console.log('Unregistered localhost service worker to prevent development cache lock.');
                window.location.reload();
              }
            });
          }
        });
        if (window.caches) {
          caches.keys().then((keys) => {
            keys.forEach((key) => caches.delete(key));
          });
        }
      } else {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker registered successfully!', reg.scope))
            .catch((err) => console.log('Service Worker registration failed:', err));
        });
      }
    }
  </script>
</body>
</html>
